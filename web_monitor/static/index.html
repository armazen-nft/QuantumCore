<!doctype html>
<html lang="pt-BR">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>OpenFM Web Monitor</title>
  <style>
    body { font-family: Arial, sans-serif; margin: 24px; }
    table { border-collapse: collapse; width: 100%; }
    th, td { border: 1px solid #ddd; padding: 8px; text-align: left; }
    th { background: #f2f2f2; }
  </style>
</head>
<body>
  <h1>Peers Ativos</h1>
  <table>
    <thead>
      <tr><th>Node ID</th><th>IP</th><th>Stored Packets</th><th>Last Seen</th></tr>
    </thead>
    <tbody id="peers"></tbody>
  </table>

  <script>
    async function refreshPeers() {
      const rsp = await fetch('/api/peers');
      const peers = await rsp.json();
      const tbody = document.getElementById('peers');
      tbody.innerHTML = '';
      for (const p of peers) {
        const tr = document.createElement('tr');
        tr.innerHTML = `<td>${p.node_id}</td><td>${p.ip}</td><td>${p.stored_packets}</td><td>${new Date(p.last_seen * 1000).toLocaleString()}</td>`;
        tbody.appendChild(tr);
      }
    }
    refreshPeers();
    setInterval(refreshPeers, 5000);
  </script>
</body>
</html>

<!DOCTYPE html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>QuantumCore - Web Monitor</title>
    <style>
      body { font-family: Arial, sans-serif; margin: 24px; }
      table { border-collapse: collapse; width: 100%; }
      th, td { border: 1px solid #ddd; padding: 8px; text-align: left; }
      th { background-color: #f2f2f2; }
    </style>
  </head>
  <body>
    <h1>Nós da Rede P2P</h1>
    <p>Atualização automática a cada 5 segundos.</p>
    <div id="peer-table">Carregando...</div>
    <script>
      async function fetchPeers() {
        const response = await fetch('/api/peers');
        const data = await response.json();
        let html = '<table><tr><th>ID do Nó</th><th>IP</th><th>Pacotes</th><th>Último visto</th></tr>';
        for (const peer of data.peers) {
          html += `<tr><td>${peer.id}</td><td>${peer.ip}</td><td>${peer.packets}</td><td>${new Date(peer.last_seen * 1000).toLocaleString()}</td></tr>`;
        }
        html += '</table>';
        document.getElementById('peer-table').innerHTML = html;
      }
      fetchPeers();
      setInterval(fetchPeers, 5000);
    </script>
  </body>
</html>
